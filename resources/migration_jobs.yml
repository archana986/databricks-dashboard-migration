# ============================================================================
# MIGRATION JOBS
# ============================================================================
# Three independent jobs for the dashboard migration workflow:
#   1. Inventory Generation - Discover dashboards and create inventory CSV
#   2. Export & Transform   - Export and transform dashboards from inventory
#   3. Generate & Deploy    - Create bundle and deploy to target workspace
#
# All variables referenced here (${var.*}) are defined in the root databricks.yml
# ============================================================================

resources:
  jobs:
    # ========================================================================
    # JOB 1: Inventory Generation
    # ========================================================================
    inventory_generation:
      name: "[Migration] Step 1 - Inventory Generation"
      description: "Generate dashboard inventory. After completion, manually run Step 2 in Databricks UI."
      tags:
        project: "dashboard-migration"
        step: "1-inventory"
        workflow: "lakeview-migration"
      
      tasks:
        - task_key: generate_inventory
          notebook_task:
            notebook_path: ../src/notebooks/Bundle_01_Inventory_Generation.ipynb
            base_parameters:
              # Core config
              catalog: ${var.catalog}
              volume_base: ${var.volume_base}
              source_workspace_url: ${var.source_workspace_url}
              # Paths
              inventory_path: ${var.inventory_path}
              # Options
              audit_lookback_days: ${var.audit_lookback_days}
          
          # TRUE SERVERLESS COMPUTE
          # No cluster definition - uses Databricks serverless by default
          # Benefits:
          # - Faster startup (no cluster provisioning)
          # - Auto-scaling based on workload
          # - No cluster management needed
          # - Ideal for SQL-heavy workloads (system table queries)
          
          # ALTERNATIVE: Standard cluster with Photon (Uncomment if serverless not working)
          # new_cluster:
          #   spark_version: "17.3.x-scala2.13"  # Latest LTS - Spark 4.0 uses Scala 2.13
          #   node_type_id: "i3.xlarge"          # AWS: i3.xlarge, Azure: Standard_D4s_v3, GCP: n1-standard-4
          #   num_workers: 1
          #   runtime_engine: PHOTON              # Photon engine for performance
          #   data_security_mode: SINGLE_USER     # Single user mode
          #   single_user_name: ${workspace.current_user.userName}
          #   autotermination_minutes: 60
          #   enable_elastic_disk: true
          #   spark_conf:
          #     spark.databricks.delta.preview.enabled: "true"
      
      # Optional: Schedule to refresh inventory weekly
      # schedule:
      #   quartz_cron_expression: "0 0 2 ? * MON"
      #   timezone_id: "America/Los_Angeles"
      #   pause_status: UNPAUSED
    
    # ========================================================================
    # JOB 2: Export & Transform
    # ========================================================================
    export_transform:
      name: "[Migration] Step 3 - Export & Transform"
      description: "Export and transform dashboards. Requires Step 2 (manual review) to be completed first."
      tags:
        project: "dashboard-migration"
        step: "3-export-transform"
        workflow: "lakeview-migration"
      
      tasks:
        - task_key: export_and_transform
          notebook_task:
            notebook_path: ../src/notebooks/Bundle_03_Export_and_Transform.ipynb
            base_parameters:
              # Core config
              catalog: ${var.catalog}
              volume_base: ${var.volume_base}
              source_workspace_url: ${var.source_workspace_url}
              target_workspace_url: ${var.target_workspace_url}
              # Paths - NOTE: Uses inventory_approved_path for QC workflow
              inventory_path: ${var.inventory_approved_path}
              exported_path: ${var.exported_path}
              transformed_path: ${var.transformed_path}
              mappings_path: ${var.mappings_path}
              # Options
              transformation_enabled: ${var.transformation_enabled}
              mapping_csv_path: ${var.mapping_csv_path}
              capture_permissions: ${var.capture_permissions}
              capture_schedules: ${var.capture_schedules}
              # Archive options
              archive_old_files: ${var.archive_old_files}
              archive_min_age_minutes: ${var.archive_min_age_minutes}
              force_archive_all: ${var.force_archive_all}
          
          # SERVERLESS COMPUTE (Default - Recommended)
          # No cluster definition - uses Databricks serverless by default
          # Benefits:
          # - Faster startup (no cluster provisioning)
          # - Auto-scaling based on workload
          # - No cluster management needed
          # - Ideal for SDK operations (export, transform, permissions)
          # NOTE: Libraries are installed in the notebook via %pip install
          
          # ALTERNATIVE: Standard cluster (Uncomment if needed)
          # Uncomment the job_cluster_key line below and the job_clusters section at bottom of this job
          # job_cluster_key: export_cluster
          
          # Libraries (only used with standard clusters, not serverless)
          # libraries:
          #   - pypi:
          #       package: "databricks-sdk>=0.18.0"
          #   - pypi:
          #       package: "pyyaml>=6.0"
          #   - pypi:
          #       package: "protobuf>=5.26.1,<6.0.0"
      
      # ALTERNATIVE: Standard cluster configuration (Uncomment if serverless not suitable)
      # NOTE: Also uncomment the libraries section above when using standard cluster
      # job_clusters:
      #   - job_cluster_key: export_cluster
      #     new_cluster:
      #       spark_version: "17.3.x-scala2.13"  # Latest LTS - Spark 4.0 uses Scala 2.13
      #       node_type_id: "i3.xlarge"          # AWS: i3.xlarge, Azure: Standard_DS3_v2, GCP: n1-standard-4
      #       num_workers: 1
      #       runtime_engine: PHOTON              # Photon engine for 3-5x performance boost
      #       data_security_mode: SINGLE_USER     # Single user mode
      #       single_user_name: ${workspace.current_user.userName}
      #       autotermination_minutes: 60
      #       enable_elastic_disk: true
      #       spark_conf:
      #         spark.databricks.delta.preview.enabled: "true"
    
    # ========================================================================
    # JOB 3: Generate & Deploy Bundle
    # ========================================================================
    generate_deploy:
      name: "[Migration] Step 4 - Generate & Deploy"
      description: "Generate asset bundles and deploy to target. Final step."
      tags:
        project: "dashboard-migration"
        step: "4-deploy"
        workflow: "lakeview-migration"
      
      # Job parameters - can be overridden at runtime via: --params key=value
      # Examples:
      #   --params dry_run_mode=false
      #   --params target_parent_path=/Shared/Custom/Path
      #   --params deployment_method=asset_bundle
      parameters:
        - name: dry_run_mode
          default: ${var.dry_run_mode}
        - name: target_parent_path
          default: ${var.target_parent_path}
        - name: deployment_method
          default: ${var.deployment_method}
      
      tasks:
        - task_key: generate_and_deploy
          notebook_task:
            notebook_path: ../src/notebooks/Bundle_04_Generate_and_Deploy.ipynb
            base_parameters:
              # Core config
              catalog: ${var.catalog}
              volume_base: ${var.volume_base}
              source_workspace_url: ${var.source_workspace_url}
              target_workspace_url: ${var.target_workspace_url}
              # Paths
              exported_path: ${var.exported_path}
              transformed_path: ${var.transformed_path}
              bundles_path: ${var.bundles_path}
              target_parent_path: "{{job.parameters.target_parent_path}}"
              # Warehouse (warehouse_id preferred, warehouse_name is fallback)
              warehouse_id: ${var.warehouse_id}
              warehouse_name: ${var.warehouse_name}
              # Bundle options
              bundle_name: ${bundle.name}
              # Options
              apply_permissions: ${var.apply_permissions}
              permissions_dry_run: ${var.permissions_dry_run}
              apply_schedules: ${var.apply_schedules}
              schedules_dry_run: ${var.schedules_dry_run}
              embed_credentials: ${var.embed_credentials}
              # Deployment method
              deployment_method: "{{job.parameters.deployment_method}}"
              dry_run_mode: "{{job.parameters.dry_run_mode}}"
              target_workspace_secret_scope: ${var.target_workspace_secret_scope}
              skip_duplicate_check: ${var.skip_duplicate_check}
              # Cross-workspace authentication
              auth_method: ${var.auth_method}
              sp_secret_scope: ${var.sp_secret_scope}
          
          # STANDARD CLUSTER (Required for cross-workspace network access)
          # Serverless compute has network restrictions that prevent connecting to other workspaces
          job_cluster_key: deploy_cluster
          
          # Libraries required for standard cluster
          libraries:
            - pypi:
                package: "databricks-sdk>=0.18.0"
            - pypi:
                package: "pyyaml>=6.0"
            - pypi:
                package: "pandas"
            - pypi:
                package: "numpy<2"
            - pypi:
                package: "protobuf>=5.26.1,<6.0.0"  # Fix: Constrain protobuf to avoid conflicts
      
      # Standard cluster configuration (Required for cross-workspace network access + UC volume access)
      # Serverless has network restrictions; standard cluster provides full connectivity and UC access
      job_clusters:
        - job_cluster_key: deploy_cluster
          new_cluster:
            spark_version: "17.3.x-scala2.13"  # Latest LTS - Spark 4.0 uses Scala 2.13
            node_type_id: ${var.node_type_id}   # Configured per target: AWS i3.xlarge, Azure Standard_DS3_v2, GCP n1-standard-4
            num_workers: 1                      # 1 worker (per cluster policy)
            autotermination_minutes: 60
            runtime_engine: STANDARD            # Standard runtime (Photon not needed for API operations)
            data_security_mode: SINGLE_USER     # Single user mode for simplicity
            single_user_name: ${workspace.current_user.userName}
            enable_elastic_disk: true
            custom_tags:
              env: "dev"
              owner: ${workspace.current_user.userName}
              Purpose: "CrossWorkspaceMigration"
