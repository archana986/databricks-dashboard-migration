# Databricks Asset Bundle for Dashboard Migration
# 
# This bundle defines three independent jobs for dashboard migration:
# 1. Inventory Generation - Discover dashboards and create inventory CSV
# 2. Export & Transform - Export and transform dashboards from inventory
# 3. Generate & Deploy - Create bundle and deploy to target workspace
#
# SINGLE SOURCE OF TRUTH: All configuration is in this file
# Update the variables below and target-specific overrides as needed

bundle:
  name: dashboard_migration

# Sync workspace files (helpers directory and notebooks)
sync:
  paths:
    - helpers
    - Bundle

# ============================================================================
# CONFIGURATION VARIABLES
# ============================================================================
# These are the default values. Override them in the targets section below
# for environment-specific configurations (dev, prod, etc.)
variables:
  # ──────────────────────────────────────────────────────────────────────────
  # SOURCE & TARGET WORKSPACES
  # ──────────────────────────────────────────────────────────────────────────
  source_workspace_url:
    description: Source workspace URL where dashboards currently exist
    default: https://YOUR-SOURCE-WORKSPACE.cloud.databricks.com
  
  target_workspace_url:
    description: Target workspace URL where dashboards will be migrated
    default: https://YOUR-TARGET-WORKSPACE.cloud.databricks.com
  
  # ──────────────────────────────────────────────────────────────────────────
  # CATALOG & VOLUME CONFIGURATION
  # ──────────────────────────────────────────────────────────────────────────
  catalog:
    description: Source catalog to scan for dashboards
    default: YOUR_CATALOG
  
  volume_base:
    description: Base volume path for migration artifacts (format /Volumes/catalog/schema/volume)
    default: /Volumes/YOUR_CATALOG/YOUR_SCHEMA/dashboard_migration
  
  # ──────────────────────────────────────────────────────────────────────────
  # PATHS (relative to volume_base)
  # ──────────────────────────────────────────────────────────────────────────
  inventory_path:
    description: Subdirectory for inventory CSV files (Step 1 output)
    default: dashboard_inventory
  
  inventory_approved_path:
    description: Subdirectory for QC-approved inventory CSV (Step 2 input)
    default: dashboard_inventory_approved
  
  exported_path:
    description: Subdirectory for exported dashboard JSONs
    default: exported
  
  transformed_path:
    description: Subdirectory for transformed dashboard JSONs
    default: transformed
  
  mappings_path:
    description: Subdirectory for mapping CSV files
    default: mappings
  
  bundles_path:
    description: Subdirectory for generated asset bundles
    default: bundles
  
  target_parent_path:
    description: Target workspace folder path for migrated dashboards
    default: /Shared/Migrated_Dashboards_V2
  
  # ──────────────────────────────────────────────────────────────────────────
  # WAREHOUSE CONFIGURATION
  # ──────────────────────────────────────────────────────────────────────────
  warehouse_name:
    description: SQL warehouse name in target workspace for dashboard execution (used if warehouse_id not provided)
    default: Shared Endpoint  # Update this to match your target workspace warehouse name
  
  warehouse_id:
    description: SQL warehouse ID in target workspace (preferred - skips name resolution)
    default: ""  # Leave empty to use warehouse_name instead
  
  # ──────────────────────────────────────────────────────────────────────────
  # INVENTORY OPTIONS
  # ──────────────────────────────────────────────────────────────────────────
  audit_lookback_days:
    description: Days to look back for audit data
    default: 90
  
  # ──────────────────────────────────────────────────────────────────────────
  # TRANSFORMATION OPTIONS
  # ──────────────────────────────────────────────────────────────────────────
  transformation_enabled:
    description: Whether to apply catalog/schema/table transformations (true/false)
    default: "true"
  
  mapping_csv_path:
    description: Path to catalog/schema/table mapping CSV (relative to volume_base)
    default: mappings/catalog_schema_mapping.csv
  
  # ──────────────────────────────────────────────────────────────────────────
  # PERMISSIONS OPTIONS
  # ──────────────────────────────────────────────────────────────────────────
  capture_permissions:
    description: Whether to export permissions from source dashboards (true/false)
    default: "true"
  
  apply_permissions:
    description: Whether to apply permissions to target dashboards (true/false)
    default: "true"
  
  permissions_dry_run:
    description: If true simulates permission application without actually applying (true/false)
    default: "true"
  
  # ──────────────────────────────────────────────────────────────────────────
  # SCHEDULE & SUBSCRIPTION OPTIONS
  # ──────────────────────────────────────────────────────────────────────────
  capture_schedules:
    description: Whether to export schedules and subscriptions from source dashboards (true/false)
    default: "true"
  
  apply_schedules:
    description: Whether to apply schedules and subscriptions to target dashboards (true/false)
    default: "true"
  
  schedules_dry_run:
    description: If true simulates schedule application without actually creating (true/false)
    default: "false"
  
  # ──────────────────────────────────────────────────────────────────────────
  # ARCHIVE OPTIONS
  # ──────────────────────────────────────────────────────────────────────────
  archive_old_files:
    description: Whether to archive old transformed/exported files before new export (true/false)
    default: "true"
  
  archive_min_age_minutes:
    description: Only archive files older than this many minutes (prevents archiving current run)
    default: "5"
  
  force_archive_all:
    description: Archive ALL files regardless of age (use to clean up old runs) (true/false)
    default: "false"
  
  skip_duplicate_check:
    description: Skip checking for existing dashboards (faster but may create duplicates) (true/false)
    default: "false"
  
  dashboard_name_suffix:
    description: Optional suffix to append to dashboard names (use to avoid conflicts with orphaned dashboards)
    default: ""
  
  # ──────────────────────────────────────────────────────────────────────────
  # BUNDLE OPTIONS
  # ──────────────────────────────────────────────────────────────────────────
  embed_credentials:
    description: Whether to embed credentials in deployed dashboards (true/false)
    default: "true"
  
  # ──────────────────────────────────────────────────────────────────────────
  # DEPLOYMENT METHOD OPTIONS
  # ──────────────────────────────────────────────────────────────────────────
  deployment_method:
    description: "Deployment method: asset_bundle (bundle + SDK for schedules) or sdk_direct (all via SDK)"
    default: "sdk_direct"
  
  dry_run_mode:
    description: Preview deployment without creating resources (true/false)
    default: "false"  # Override in target-specific variables for safety
  
  
  skip_ip_check:
    description: Skip IP whitelist check before deployment (NOT recommended for production) (true/false)
    default: "false"
  
  target_workspace_secret_scope:
    description: Secret scope containing target workspace credentials (for cross-workspace auth)
    default: "migration_secrets"
  
  # ──────────────────────────────────────────────────────────────────────────
  # CROSS-WORKSPACE AUTHENTICATION
  # ──────────────────────────────────────────────────────────────────────────
  auth_method:
    description: "Authentication method for target workspace: pat (PAT token) or sp_oauth (Service Principal OAuth M2M)"
    default: "pat"  # Options: "pat", "sp_oauth"
  
  sp_secret_scope:
    description: "Secret scope containing SP OAuth credentials (sp_client_id, sp_client_secret). Used when auth_method=sp_oauth"
    default: "migration_secrets"

resources:
  jobs:
    # ========================================================================
    # JOB 1: Inventory Generation
    # ========================================================================
    inventory_generation:
      name: "[Migration] Step 1 - Inventory Generation"
      description: "Generate dashboard inventory. After completion, manually run Step 2 in Databricks UI."
      tags:
        project: "dashboard-migration"
        step: "1-inventory"
        workflow: "lakeview-migration"
      
      tasks:
        - task_key: generate_inventory
          notebook_task:
            notebook_path: Bundle/Bundle_01_Inventory_Generation.ipynb
            base_parameters:
              # Core config
              catalog: ${var.catalog}
              volume_base: ${var.volume_base}
              source_workspace_url: ${var.source_workspace_url}
              # Paths
              inventory_path: ${var.inventory_path}
              # Options
              audit_lookback_days: ${var.audit_lookback_days}
          
          # TRUE SERVERLESS COMPUTE
          # No cluster definition - uses Databricks serverless by default
          # Benefits:
          # - Faster startup (no cluster provisioning)
          # - Auto-scaling based on workload
          # - No cluster management needed
          # - Ideal for SQL-heavy workloads (system table queries)
          
          # ALTERNATIVE: Standard cluster with Photon (Uncomment if serverless not working)
          # new_cluster:
          #   spark_version: "17.3.x-scala2.13"  # Latest LTS - Spark 4.0 uses Scala 2.13
          #   node_type_id: "i3.xlarge"          # AWS: i3.xlarge, Azure: Standard_D4s_v3, GCP: n1-standard-4
          #   num_workers: 1
          #   runtime_engine: PHOTON              # Photon engine for performance
          #   data_security_mode: SINGLE_USER     # Single user mode
          #   single_user_name: ${workspace.current_user.userName}
          #   autotermination_minutes: 60
          #   enable_elastic_disk: true
          #   spark_conf:
          #     spark.databricks.delta.preview.enabled: "true"
      
      # Optional: Schedule to refresh inventory weekly
      # schedule:
      #   quartz_cron_expression: "0 0 2 ? * MON"
      #   timezone_id: "America/Los_Angeles"
      #   pause_status: UNPAUSED
    
    # ========================================================================
    # JOB 2: Export & Transform
    # ========================================================================
    export_transform:
      name: "[Migration] Step 3 - Export & Transform"
      description: "Export and transform dashboards. Requires Step 2 (manual review) to be completed first."
      tags:
        project: "dashboard-migration"
        step: "3-export-transform"
        workflow: "lakeview-migration"
      
      tasks:
        - task_key: export_and_transform
          notebook_task:
            notebook_path: Bundle/Bundle_03_Export_and_Transform.ipynb
            base_parameters:
              # Core config
              catalog: ${var.catalog}
              volume_base: ${var.volume_base}
              source_workspace_url: ${var.source_workspace_url}
              target_workspace_url: ${var.target_workspace_url}
              # Paths - NOTE: Uses inventory_approved_path for QC workflow
              inventory_path: ${var.inventory_approved_path}
              exported_path: ${var.exported_path}
              transformed_path: ${var.transformed_path}
              mappings_path: ${var.mappings_path}
              # Options
              transformation_enabled: ${var.transformation_enabled}
              mapping_csv_path: ${var.mapping_csv_path}
              capture_permissions: ${var.capture_permissions}
              capture_schedules: ${var.capture_schedules}
              # Archive options
              archive_old_files: ${var.archive_old_files}
              archive_min_age_minutes: ${var.archive_min_age_minutes}
              force_archive_all: ${var.force_archive_all}
          
          # SERVERLESS COMPUTE (Default - Recommended)
          # No cluster definition - uses Databricks serverless by default
          # Benefits:
          # - Faster startup (no cluster provisioning)
          # - Auto-scaling based on workload
          # - No cluster management needed
          # - Ideal for SDK operations (export, transform, permissions)
          # NOTE: Libraries are installed in the notebook via %pip install
          
          # ALTERNATIVE: Standard cluster (Uncomment if needed)
          # Uncomment the job_cluster_key line below and the job_clusters section at bottom of this job
          # job_cluster_key: export_cluster
          
          # Libraries (only used with standard clusters, not serverless)
          # libraries:
          #   - pypi:
          #       package: "databricks-sdk>=0.18.0"
          #   - pypi:
          #       package: "pyyaml>=6.0"
          #   - pypi:
          #       package: "protobuf>=5.26.1,<6.0.0"
      
      # ALTERNATIVE: Standard cluster configuration (Uncomment if serverless not suitable)
      # NOTE: Also uncomment the libraries section above when using standard cluster
      # job_clusters:
      #   - job_cluster_key: export_cluster
      #     new_cluster:
      #       spark_version: "17.3.x-scala2.13"  # Latest LTS - Spark 4.0 uses Scala 2.13
      #       node_type_id: "i3.xlarge"          # AWS: i3.xlarge, Azure: Standard_DS3_v2, GCP: n1-standard-4
      #       num_workers: 1
      #       runtime_engine: PHOTON              # Photon engine for 3-5x performance boost
      #       data_security_mode: SINGLE_USER     # Single user mode
      #       single_user_name: ${workspace.current_user.userName}
      #       autotermination_minutes: 60
      #       enable_elastic_disk: true
      #       spark_conf:
      #         spark.databricks.delta.preview.enabled: "true"
    
    # ========================================================================
    # JOB 3: Generate & Deploy Bundle
    # ========================================================================
    generate_deploy:
      name: "[Migration] Step 4 - Generate & Deploy"
      description: "Generate asset bundles and deploy to target. Final step."
      tags:
        project: "dashboard-migration"
        step: "4-deploy"
        workflow: "lakeview-migration"
      
      # Job parameters - can be overridden at runtime via: --params key=value
      # Examples:
      #   --params dry_run_mode=false
      #   --params target_parent_path=/Shared/Custom/Path
      #   --params deployment_method=asset_bundle
      parameters:
        - name: dry_run_mode
          default: ${var.dry_run_mode}
        - name: target_parent_path
          default: ${var.target_parent_path}
        - name: deployment_method
          default: ${var.deployment_method}
      
      tasks:
        - task_key: generate_and_deploy
          notebook_task:
            notebook_path: Bundle/Bundle_04_Generate_and_Deploy.ipynb
            base_parameters:
              # Core config
              catalog: ${var.catalog}
              volume_base: ${var.volume_base}
              source_workspace_url: ${var.source_workspace_url}
              target_workspace_url: ${var.target_workspace_url}
              # Paths
              exported_path: ${var.exported_path}
              transformed_path: ${var.transformed_path}
              bundles_path: ${var.bundles_path}
              target_parent_path: "{{job.parameters.target_parent_path}}"
              # Warehouse (warehouse_id preferred, warehouse_name is fallback)
              warehouse_id: ${var.warehouse_id}
              warehouse_name: ${var.warehouse_name}
              # Bundle options
              bundle_name: ${bundle.name}
              # Options
              apply_permissions: ${var.apply_permissions}
              permissions_dry_run: ${var.permissions_dry_run}
              apply_schedules: ${var.apply_schedules}
              schedules_dry_run: ${var.schedules_dry_run}
              embed_credentials: ${var.embed_credentials}
              # Deployment method
              deployment_method: "{{job.parameters.deployment_method}}"
              dry_run_mode: "{{job.parameters.dry_run_mode}}"
              target_workspace_secret_scope: ${var.target_workspace_secret_scope}
              skip_duplicate_check: ${var.skip_duplicate_check}
              # Cross-workspace authentication
              auth_method: ${var.auth_method}
              sp_secret_scope: ${var.sp_secret_scope}
          
          # STANDARD CLUSTER (Required for cross-workspace network access)
          # Serverless compute has network restrictions that prevent connecting to other workspaces
          job_cluster_key: deploy_cluster
          
          # Libraries required for standard cluster
          libraries:
            - pypi:
                package: "databricks-sdk>=0.18.0"
            - pypi:
                package: "pyyaml>=6.0"
            - pypi:
                package: "pandas"
            - pypi:
                package: "numpy<2"
            - pypi:
                package: "protobuf>=5.26.1,<6.0.0"  # Fix: Constrain protobuf to avoid conflicts
      
      # Standard cluster configuration (Required for cross-workspace network access + UC volume access)
      # Serverless has network restrictions; standard cluster provides full connectivity and UC access
      job_clusters:
        - job_cluster_key: deploy_cluster
          new_cluster:
            spark_version: "17.3.x-scala2.13"  # Latest LTS - Spark 4.0 uses Scala 2.13
            node_type_id: "i3.xlarge"          # AWS: i3.xlarge | Azure: Standard_DS3_v2 | GCP: n1-standard-4
            num_workers: 1                      # 1 worker (per cluster policy)
            autotermination_minutes: 60
            runtime_engine: STANDARD            # Standard runtime (Photon not needed for API operations)
            data_security_mode: SINGLE_USER     # Single user mode for simplicity
            single_user_name: ${workspace.current_user.userName}
            enable_elastic_disk: true
            custom_tags:
              env: "dev"
              owner: ${workspace.current_user.userName}
              Purpose: "CrossWorkspaceMigration"
    
    
# ============================================================================
# DEPLOYMENT TARGETS
# ============================================================================
# Define environment-specific overrides here
# Customize these for your workspaces
targets:
  # ──────────────────────────────────────────────────────────────────────────
  # DEV: Development Environment
  # ──────────────────────────────────────────────────────────────────────────
  # DESIGN: All configuration in YAML (single source of truth)
  # ONLY dry_run_mode is CLI-overridable for safety
  #
  # USAGE:
  #   Dry run (safe default): databricks bundle run generate_deploy -t dev --profile source-workspace
  #   Live deploy:            databricks bundle run generate_deploy -t dev --var="dry_run_mode=false" --profile source-workspace
  #
  # To change deployment_method or auth_method: Edit this YAML and redeploy bundle
  # ──────────────────────────────────────────────────────────────────────────
  # ──────────────────────────────────────────────────────────────────────────
  # DEV ENVIRONMENT 
  # ──────────────────────────────────────────────────────────────────────────
  # INSTRUCTIONS: Update ALL values below for your environment before deploying
  # ──────────────────────────────────────────────────────────────────────────
  dev:
    mode: development
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com  # UPDATE: Your source workspace URL
    
    variables:
      # ════════════════════════════════════════════════════════════════════════
      # WORKSPACE CONFIGURATION - UPDATE ALL THESE FOR YOUR ENVIRONMENT
      # ════════════════════════════════════════════════════════════════════════
      catalog: archana_krish_fe_dsa                          # UPDATE: Your catalog name
      volume_base: /Volumes/archana_krish_fe_dsa/vizient_deep_dive/dashboard_migration  # UPDATE: Your volume path
      source_workspace_url: https://e2-demo-field-eng.cloud.databricks.com  # UPDATE: Source workspace
      target_workspace_url: https://fevm-akrishn-stable-classic-vv5y0k.cloud.databricks.com  # UPDATE: Target workspace
      warehouse_id: 53af68e7019d2b78                         # UPDATE: Target warehouse ID (or leave empty)
      warehouse_name: ak-migration                            # UPDATE: Target warehouse name
      
      # ════════════════════════════════════════════════════════════════════════
      # DEPLOYMENT CONFIGURATION (Edit to change behavior, then redeploy bundle)
      # ════════════════════════════════════════════════════════════════════════
      deployment_method: "asset_bundle"    # Options: "asset_bundle" (recommended) or "sdk_direct"
      auth_method: "pat"                 # Options: "pat" or "sp_oauth"
      skip_duplicate_check: "false"      # Options: "true" or "false"
      
      # ════════════════════════════════════════════════════════════════════════
      # RUNTIME CONTROL (CLI-overridable for safety)
      # ════════════════════════════════════════════════════════════════════════
      dry_run_mode: "true"  # ONLY this parameter can be overridden via CLI: --var="dry_run_mode=false"
  
  # ──────────────────────────────────────────────────────────────────────────
  # STAGING ENVIRONMENT (Template - customize before use)
  # ──────────────────────────────────────────────────────────────────────────
  staging:
    mode: development  # Use 'development' mode for staging
    workspace:
      host: https://your-staging-workspace.cloud.databricks.com  # CHANGE THIS to staging workspace URL
    
    variables:
      # Core configuration - CUSTOMIZE THESE
      catalog: staging_catalog  # Source catalog in staging
      volume_base: /Volumes/staging_catalog/migration/dashboard_migration  # Staging volume path
      source_workspace_url: https://YOUR-SOURCE-WORKSPACE.cloud.databricks.com  # Source workspace (usually dev or prod)
      target_workspace_url: https://your-staging-workspace.cloud.databricks.com  # CHANGE THIS
      warehouse_name: staging_warehouse  # CHANGE THIS to staging warehouse name
      
      # Staging-specific overrides
      permissions_dry_run: "true"  # Test permissions without applying
      audit_lookback_days: 30  # Shorter lookback for staging
  
  # ──────────────────────────────────────────────────────────────────────────
  # PROD ENVIRONMENT (Template - customize before use)
  # ──────────────────────────────────────────────────────────────────────────
  prod:
    mode: production
    workspace:
      host: https://your-prod-workspace.cloud.databricks.com  # CHANGE THIS
    
    variables:
      # Core configuration - CUSTOMIZE THESE
      catalog: production_catalog  # Source catalog in prod
      volume_base: /Volumes/production_catalog/migration/dashboard_migration  # Prod volume path
      source_workspace_url: https://your-prod-workspace.cloud.databricks.com  # CHANGE THIS
      target_workspace_url: https://your-prod-target.cloud.databricks.com  # CHANGE THIS
      warehouse_name: production_warehouse  # CHANGE THIS
      
      # Prod-specific overrides
      permissions_dry_run: "false"  # Actually apply permissions in prod
    
    # Production safeguards (optional)
    permissions:
      - level: CAN_MANAGE
        group_name: data_platform_admins  # CHANGE THIS to your admin group
