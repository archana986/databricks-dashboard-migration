# Target bundle — deploy to the TARGET workspace.
# Transfers artifacts from the source export volume, then creates dashboards
# with permissions and schedules in this workspace.
#
# Setup:
#   1. Run: databricks auth login -p <your-profile> --host <your-target-workspace-url>
#   2. Edit the "targets > default" section below with your values
#   3. Deploy: cd target && databricks bundle deploy
#   4. Run:    databricks bundle run tgt_dashboard_register

bundle:
  name: dashboard-migration-tgt

include:
  - resources/*.yml

sync:
  paths:
    - src/notebooks
    - src/helpers

# ──────────────────────────────────────────────────────────────────────────────
# Variable definitions — defaults are placeholders.
# Override them in the "targets > default > variables" section below.
# ──────────────────────────────────────────────────────────────────────────────
variables:
  source_catalog:
    description: Source catalog (holds export volume)
    default: YOUR_SOURCE_CATALOG
  target_catalog:
    description: Target catalog (holds import volume)
    default: YOUR_TARGET_CATALOG
  source_schema:
    description: Schema in source catalog (holds export volume)
    default: default
  target_schema:
    description: Schema in target catalog (holds import volume)
    default: default
  export_volume:
    description: Export volume name in source catalog
    default: dashboard_migration
  import_volume:
    description: Import volume name in target catalog (auto-created by transfer job)
    default: dashboard_migration
  volume_base:
    description: Full path to import volume (used by deploy task)
    default: /Volumes/YOUR_TARGET_CATALOG/default/dashboard_migration
  exported_path:
    description: Subdirectory for exported JSONs (relative to volume_base)
    default: exported
  transformed_path:
    description: Subdirectory for transformed JSONs (relative to volume_base)
    default: transformed
  target_parent_path:
    description: Workspace folder path for migrated dashboards
    default: /Shared/Migrated_Dashboards
  warehouse_id:
    description: SQL warehouse ID for dashboard execution (find in SQL Warehouses UI)
    default: ""
  warehouse_name:
    description: SQL warehouse name (fallback if warehouse_id is empty)
    default: ""
  apply_permissions:
    description: Apply permissions to deployed dashboards (true/false)
    default: "true"
  apply_schedules:
    description: Apply schedules and subscriptions (true/false)
    default: "true"
  embed_credentials:
    description: Embed credentials in dashboards (true/false)
    default: "true"
  skip_duplicate_check:
    description: Skip checking for existing dashboards (true/false)
    default: "false"
  dry_run_mode:
    description: Preview only, do not create resources (true/false)
    default: "false"

# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  EDIT HERE — replace placeholder values with your environment details      ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
targets:
  default:
    default: true
    workspace:
      # CLI profile name from ~/.databrickscfg (created by: databricks auth login)
      profile: target-profile
      # Target workspace URL (e.g. https://adb-789012.10.azuredatabricks.net)
      host: https://YOUR-TARGET-WORKSPACE.cloud.databricks.com
    variables:
      # Catalog in the SOURCE workspace that holds the export volume
      source_catalog: YOUR_SOURCE_CATALOG
      # Catalog in the TARGET workspace that holds the import volume
      target_catalog: YOUR_TARGET_CATALOG
      # Schema names (can differ between source and target)
      source_schema: default
      target_schema: default
      # Volume names
      export_volume: dashboard_migration
      import_volume: dashboard_migration
      # Full import volume path: /Volumes/<target_catalog>/<target_schema>/<import_volume>
      volume_base: /Volumes/YOUR_TARGET_CATALOG/default/dashboard_migration
      # SQL warehouse ID (copy from SQL Warehouses > your warehouse > Connection details)
      warehouse_id: ""
      # Workspace folder where dashboards will be created
      target_parent_path: /Shared/Migrated_Dashboards
